# rusts3 configuration file
# Pass with: rusts3 -c config.yaml
# All fields are optional; values shown below are the compiled-in defaults.

# ─── Server ───────────────────────────────────────────────────────────────────
server:
  # IP address to listen on.  0.0.0.0 = all interfaces.
  bind_address: "192.168.44.172"

  # TCP port.
  bind_port: 18000

  # Root directory where bucket data is stored.
  # Each bucket gets a sub-directory: <base_dir>/buckets/<bucket-name>/
  base_dir: "./test-data"

# ─── Storage ──────────────────────────────────────────────────────────────────
storage:
  # Maximum SQLite connections kept open per bucket index pool.
  sqlite_max_connections: 50

  # Maximum object metadata entries in the LRU cache.
  # Each entry is roughly 400–700 bytes; 200 000 entries ≈ 80–140 MB.
  # HEAD and GET requests are served from this cache on warm hits.
  meta_cache_capacity: 200000

  # Maximum entries in the SQLite-repair suppression cache.
  # Each entry is roughly 100 bytes; 200 000 entries ≈ 20 MB.
  sqlite_repair_cache_capacity: 200000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  # Log level: trace | debug | info | warn | error
  level: "info"

  # Emit aggregate bandwidth totals and rates every 10 seconds.
  enable_bandwidth_report: true

  # Path to a rolling log file.  When omitted, logs go to stdout only.
  # file: "/var/log/rusts3/rusts3.log"

  # Rotate when the file reaches this size (MiB).
  rotation_size_mb: 100

  # Number of archived log files to keep alongside the active log.
  keep_files: 5

  # Compress archived files with gzip (.gz extension added automatically).
  compress: false

# ─── Background maintenance ───────────────────────────────────────────────────
sweeper:
  # How often background maintenance runs (seconds).
  interval_secs: 300

  # Targeted visibility repair batch size.
  # One maintenance pass drains all eligible rows in batches of this size.
  visibility_repair_batch_size: 100

  # Minimum age of a targeted visibility repair during normal runtime (seconds).
  visibility_repair_grace_period_secs: 86400

  # Minimum idle age of an abandoned staging directory before removal (seconds).
  staging_expiry_secs: 86400

  # Minimum idle age of a trash directory before removal (seconds).
  trash_expiry_secs: 600

# ─── Authentication ───────────────────────────────────────────────────────────
auth:
  # Set to true to require SigV4 signatures on every request.
  # When false the server accepts all requests without credentials.
  enabled: false

  # The hostname (and optional port) that S3 clients are configured to use.
  # Example: "mys3.company.com" or "localhost:8002"
  #
  # When set, presigned URL verification uses this value for the `host` signed
  # header instead of the incoming HTTP Host header.  This makes presigned URLs
  # work correctly behind a reverse proxy that rewrites the Host header.
  # Clients must configure their endpoint to match this value exactly.
  #
  # When omitted (default), the incoming Host header is used directly.
  # public_hostname: "localhost:18000"

  # List of valid access-key / secret-key pairs.
  credentials:
    - access_key: "minioadmin"
      secret_key: "minioadmin"
    - access_key: "AKIAIOSFODNN7EXAMPLE"
      secret_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
