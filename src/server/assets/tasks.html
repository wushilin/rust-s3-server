<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#07111f">
<title>Active Tasks · RustS3</title>
<style>
  :root {
    --bg:#f4f6f8; --surface:#fff; --surface-soft:#f8fafc; --line:#e2e7ec; --line-strong:#cdd5df;
    --text:#17212f; --muted:#647184; --subtle:#8d98a8; --accent:#c51f38; --accent-hover:#aa172e; --accent-soft:#fff0f2;
    --shadow-sm:0 1px 2px rgba(15,23,42,.05); --radius:10px;
  }
  * { box-sizing:border-box; }
  html, body { height:100%; }
  body { margin:0; font:14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
  .icon { width:18px; height:18px; flex:0 0 auto; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .hidden { display:none !important; }
  .spacer { flex:1; }

  .gate { min-height:100%; display:grid; place-items:center; padding:40px; color:var(--muted); font-size:14px; text-align:center; }

  .tv-wrap { max-width:840px; margin:0 auto; padding:26px 20px 60px; }
  .tv-head { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
  .tv-title { display:flex; align-items:center; gap:11px; }
  .tv-title .icon { width:24px; height:24px; color:var(--accent); }
  .tv-title h1 { margin:0; font-size:20px; letter-spacing:-.02em; }
  .task-badge { display:inline-flex; align-items:center; gap:8px; height:32px; padding:0 13px; border:1px solid var(--line-strong); border-radius:999px; background:#fff; font-size:12.5px; font-weight:600; white-space:nowrap; }
  .task-dot { width:8px; height:8px; border-radius:50%; flex:none; background:var(--accent); }
  .task-badge.idle .task-dot { background:#1f9d57; }
  .task-badge.idle #taskBadgeLabel { color:#1f9d57; }
  .task-badge:not(.idle) #taskBadgeLabel { color:var(--accent); }
  .tv-rate { font-variant-numeric:tabular-nums; font-weight:600; font-size:12px; color:var(--muted); white-space:nowrap; }
  .tv-rate .rate-up { color:var(--accent); }
  .tv-rate .rate-dn { color:var(--muted); }

  .tv-body { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); overflow:hidden; }
  .task-row { display:flex; align-items:center; gap:11px; padding:12px 16px; border-bottom:1px solid var(--line); }
  .task-row:last-child { border-bottom:0; }
  .task-op { flex:none; width:32px; height:32px; border-radius:7px; display:grid; place-items:center; background:var(--surface-soft); color:var(--muted); }
  .task-op .icon { width:17px; height:17px; }
  .task-op.job { background:var(--accent-soft); color:var(--accent); }
  .task-op.done { background:#e4f5ea; color:#1f9d57; }
  .task-row.done { opacity:.85; }
  .task-row.vanish { max-height:0!important; opacity:0; padding-top:0; padding-bottom:0; overflow:hidden; transition:max-height .3s ease, opacity .28s ease, padding .3s ease; }
  .task-main { min-width:0; flex:1; display:flex; flex-direction:column; gap:2px; }
  .task-target { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .task-status { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .task-bar { height:3px; border-radius:2px; background:var(--line); overflow:hidden; margin-top:6px; }
  .task-bar > span { display:block; height:100%; background:var(--accent); border-radius:2px; transition:width .3s ease; }
  .task-bar.indet > span { width:32%; animation:taskindet 1.1s ease-in-out infinite; }
  @keyframes taskindet { 0%{margin-left:-32%} 100%{margin-left:100%} }
  .task-up { flex:0 0 auto; align-self:center; font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-soft); border:1px solid #f2c2ca; border-radius:999px; padding:3px 9px; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .task-cancel { flex:none; width:26px; height:26px; border:0; border-radius:6px; background:var(--accent); display:grid; place-items:center; cursor:pointer; transition:background .12s; }
  .task-cancel:hover { background:var(--accent-hover); }
  .task-cancel .stop { width:9px; height:9px; background:#fff; border-radius:1.5px; }
  .task-cancel-spacer { flex:none; width:26px; }
  .tasks-empty { padding:40px 16px; text-align:center; color:var(--muted); font-size:13px; }
</style>
</head>
<body>

<div id="gate" class="gate">Loading…</div>

<div id="taskView" class="tv-wrap hidden">
  <div class="tv-head">
    <div class="tv-title"><span data-icon="activity"></span><h1>Active Tasks</h1></div>
    <span class="spacer"></span>
    <span class="task-badge idle" id="taskBadge"><span class="task-dot"></span><span id="taskBadgeLabel">Idle</span></span>
    <span class="tv-rate" id="taskBadgeRate"><span class="rate-up">↑ 0 B/s</span> <span class="rate-dn">↓ 0 B/s</span></span>
  </div>
  <div class="tv-body" id="tasksPopover">
    <div id="tasksActive"></div>
    <div id="tasksDone"></div>
    <div id="tasksEmpty" class="tasks-empty">Nothing running right now.</div>
  </div>
</div>

<!-- Reuse the exact same modules the console uses. core.js gives us the icon
     set + helpers + the API client; tasks.js is the whole live-task engine. -->
<script src="/assets/core.js"></script>
<script src="/assets/tasks.js"></script>
<script>
// Standalone bootstrap: resolve the session, gate on admin, then let tasks.js
// drive the same WebSocket/polling machinery it drives inside the console.
(async function(){
  try { me = await api('GET','/api/me'); }
  catch { $('gate').textContent = 'Sign in to the console first, then reopen this page.'; return; }
  if (!me.is_admin) { $('gate').textContent = 'Active tasks are available to administrators only.'; return; }
  $('gate').classList.add('hidden');
  $('taskView').classList.remove('hidden');
  hydrateIcons();
  refreshTasks();
  connectTasksWs();
})();
</script>
</body>
</html>
